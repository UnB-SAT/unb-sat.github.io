title: UnB-SAT
description: "Satisfiability and Automated Planning group · Universidade de Brasília"
url: "https://unb-sat.github.io"
lang: en
logo: "/assets/logo.png"

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

color_scheme: light
search_enabled: true

# Repo-only docs: kept in the repository for anyone who clones it, but not built into
# the site (no page, no nav entry, no search result).
exclude:
  - CLAUDE.md
  - README.md
  - data
  - scripts
  - Gemfile
  - Gemfile.lock
  - vendor

aux_links:
  "Organization": "https://github.com/UnB-SAT"
  "CD-MOJ": "https://cd-moj.github.io/cd-moj.docs/"
aux_links_new_tab: true

footer_content: >
  UnB-SAT is a research and teaching group, not yet a formally consolidated
  laboratory at UnB; a proposal to establish the laboratory is planned for the near
  future. Built with support from Claude (Anthropic).

# The People / Theses / Iniciação Científica sections are generated by
# scripts/build_profile.py in this repository. Do not edit them by hand.
