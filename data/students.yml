# =============================================================================
#  UnB-SAT  .  people, advised theses and undergraduate research
#  Single source of truth for the group website (https://unb-sat.github.io)
# -----------------------------------------------------------------------------
#  Edit this file, then run:   python3 scripts/build_profile.py
#  It regenerates the AUTOGEN sections of the site pages:
#  people.md (people grid), theses.md (current + completed), research.md (IC).
#
#  PERSON
#    name      : full name (required)
#    github    : GitHub *handle* only, e.g. "bcribas"  (drives the avatar)
#    lattes    : full Lattes URL,  e.g. "http://lattes.cnpq.br/0000000000000000"
#    linkedin  : full LinkedIn URL
#    theme     : sat | planning | moj | ai   (used to place the person card)
#    advisings : list of works advised by Bruno (see below)
#
#  ADVISING (one block per work)
#    kind   : tcc | msc | ic
#    year   : defense / completion year
#    title  : original (Portuguese or English) title
#    en     : short English gloss (one line)
#    bdm    : permalink (BDM for TCC, repositorio.unb.br for MSc)   [tcc/msc]
#    repo   : related repo URL under github.com/UnB-SAT             [optional]
#    theme  : override the person's theme for this work             [optional]
#    scholarship : true/false (had a grant)                         [ic]
#    program     : "PIBIC" | "PIBITI" | ""  (Lattes does not record  [ic]
#                  which programme; please fill this in)
#    link        : project/home page                                [optional]
#    status      : "ongoing" for work in progress (omit when done).
#                  Ongoing work appears under "Current students".
#    provisional : true if the title is still provisional            [optional]
#    ends        : expected completion, e.g. "August 2026"     [ic, ongoing]
#
#  Empty fields render a neutral placeholder and a "links to add" note.
# =============================================================================

