name: Build pages from data

# Regenerates the People / Theses / Iniciação Científica pages from
# data/students.yml and commits them. It triggers only on changes to the data or
# the generator (not on the generated pages), so the bot's own commit never
# re-triggers it. Also runnable on demand from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - data/students.yml
      - scripts/build_profile.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - run: python3 scripts/build_profile.py
      - name: Commit regenerated pages
        run: |
          if [ -n "$(git status --porcelain '*.md')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add '*.md'
            git commit -m "Rebuild pages from data/students.yml"
            git push
          else
            echo "Pages already up to date."
          fi
